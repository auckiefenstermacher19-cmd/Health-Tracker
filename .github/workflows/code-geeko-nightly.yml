name: Code-Geeko Nightly

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC nightly
  workflow_dispatch: {}    # manual runs allowed; ALWAYS report-only until Task 14

# Two overlapping runs would double triage spend and race the state push.
concurrency:
  group: code-geeko-nightly
  cancel-in-progress: false

# An explicit permissions block zeroes every unlisted scope — actions: read is required or the
# CI-log collector's runs-API call 403s (silently: it degrades to a failed source, run stays green).
permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # cap a hang at 1h instead of the 6h default
    steps:
      # SHA-pinned: semgrep's github-actions-mutable-action-tag rule fires on @vN tags — an
      # unpinned tag here would make Code-Geeko's first report flag its own workflow file.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          # persist-credentials defaults true — the state push (and fix-mode branch pushes)
          # authenticate via the persisted header. Do not set it to false.

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: codegeeko/requirements.txt

      - name: Install dependencies
        run: pip install -r codegeeko/requirements.txt

      - name: Smoke-check runtime
        # Real one-turn query() that forces triage.py's exact end-to-end path:
        # CLI resolve (bundled _bundled/claude, shipped in the manylinux wheel) -> spawn ->
        # authenticate with the Max-plan CLAUDE_CODE_OAUTH_TOKEN -> stream a terminal ResultMessage. Replaces the
        # old import-only smoke (`node --version` + `python -c "from claude_agent_sdk import
        # query"`), which never entered SubprocessCLITransport and so could NOT detect a missing
        # CLI, a bad/missing key, a too-old runtime, or a spawn failure. Any failure exits
        # nonzero HERE, cheaply, before collectors/pipeline run. `timeout` bounds any hang.
        # No npm step: on ubuntu-latest (glibc x86_64) pip always resolves the platform wheel
        # that bundles the CLI, so an `npm install -g @anthropic-ai/claude-code` is pure
        # redundancy that only adds per-night registry-flake risk; and in the wheel-less edge
        # (musl/sdist/--no-binary) this same query() fails loud as CLINotFoundError anyway,
        # which IS the fail-loud-and-cheap goal.
        env:
          # Max-plan subscription auth: 1-year token from `claude setup-token`, stored as a repo
          # secret. The Agent SDK / bundled CLI reads it from the env (auth precedence #5). We do
          # NOT set ANTHROPIC_API_KEY here: it outranks the OAuth token (precedence #3), so even an
          # empty value would shadow the subscription credential. Masked in logs; required to test auth.
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          DISABLE_AUTOUPDATER: "1"                               # no CLI auto-update traffic on an ephemeral runner
          CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"          # no telemetry spawn
        run: |
          timeout 150 python - <<'PY'
          import asyncio, sys
          from claude_agent_sdk import ClaudeAgentOptions, query, ResultMessage

          async def _smoke():
              opts = ClaudeAgentOptions(model="claude-sonnet-5", allowed_tools=[], max_turns=1)
              final = None
              async for msg in query(prompt="Reply with exactly: ok", options=opts):
                  if isinstance(msg, ResultMessage):
                      final = msg
              return final

          try:
              final = asyncio.run(_smoke())
          except Exception as e:
              # Missing bundled binary -> CLINotFoundError; bad/missing credential, auth 401, or spawn
              # failure -> ProcessError/CLIConnectionError. All land here and fail loud.
              print(f"SDK SMOKE FAILED: query() raised {type(e).__name__}: {e}", file=sys.stderr)
              sys.exit(1)
          if final is None:
              print("SDK SMOKE FAILED: no ResultMessage - CLI spawned but never completed a turn", file=sys.stderr)
              sys.exit(1)
          if getattr(final, "is_error", True):
              print(f"SDK SMOKE FAILED: error result (subtype={getattr(final, 'subtype', None)!r})", file=sys.stderr)
              sys.exit(1)
          print("SDK smoke OK")
          PY

      - name: Pipeline self-test
        # `python -m pytest` (not bare `pytest`) so CWD (repo root) lands on sys.path and the
        # codegeeko package imports -- bare pytest passed locally but ModuleNotFoundError'd in CI.
        run: python -m pytest tests/codegeeko -q

      - name: Run Code-Geeko
        shell: bash   # explicit bash = -eo pipefail, so tee can't mask a pipeline crash
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}   # Max-plan subscription auth (see smoke step)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_ONLY: "true"   # hardcoded until Task 14's validation gate — do not parameterize
        run: |
          git config user.name "code-geeko[bot]"
          git config user.email "code-geeko@users.noreply.github.com"
          python -m codegeeko.run | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Commit updated state
        run: |
          # checkout main defends against fix mode (Task 14+) leaving HEAD on a fix branch,
          # which would silently commit state to the wrong branch.
          git checkout main
          git add .code-geeko/state.json
          if git diff --cached --quiet; then
            echo "State unchanged — nothing to commit."
          else
            git commit -m "chore: update code-geeko state"
            # consolidate.yml can push to main at ANY time (repository_dispatch) — rebase first
            # or this push loses the race. Nothing else writes .code-geeko/, so no conflicts.
            git pull --rebase origin main
            git push origin main
          fi
