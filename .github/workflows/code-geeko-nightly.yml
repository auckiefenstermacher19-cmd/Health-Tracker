name: Code-Geeko Nightly

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC nightly
  workflow_dispatch: {}    # manual runs allowed; ALWAYS report-only until Task 14

# Two overlapping runs would double triage spend and race the state push.
concurrency:
  group: code-geeko-nightly
  cancel-in-progress: false

# An explicit permissions block zeroes every unlisted scope — actions: read is required or the
# CI-log collector's runs-API call 403s (silently: it degrades to a failed source, run stays green).
permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60   # cap a hang at 1h instead of the 6h default
    steps:
      # SHA-pinned: semgrep's github-actions-mutable-action-tag rule fires on @vN tags — an
      # unpinned tag here would make Code-Geeko's first report flag its own workflow file.
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          # persist-credentials defaults true — the state push (and fix-mode branch pushes)
          # authenticate via the persisted header. Do not set it to false.

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: codegeeko/requirements.txt

      - name: Install dependencies
        run: pip install -r codegeeko/requirements.txt

      - name: Smoke-check runtime
        run: |
          node --version
          python -c "from claude_agent_sdk import query"

      - name: Pipeline self-test
        run: pytest tests/codegeeko -q

      - name: Run Code-Geeko
        shell: bash   # explicit bash = -eo pipefail, so tee can't mask a pipeline crash
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPORT_ONLY: "true"   # hardcoded until Task 14's validation gate — do not parameterize
        run: |
          git config user.name "code-geeko[bot]"
          git config user.email "code-geeko@users.noreply.github.com"
          python -m codegeeko.run | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Commit updated state
        run: |
          # checkout main defends against fix mode (Task 14+) leaving HEAD on a fix branch,
          # which would silently commit state to the wrong branch.
          git checkout main
          git add .code-geeko/state.json
          if git diff --cached --quiet; then
            echo "State unchanged — nothing to commit."
          else
            git commit -m "chore: update code-geeko state"
            # consolidate.yml can push to main at ANY time (repository_dispatch) — rebase first
            # or this push loses the race. Nothing else writes .code-geeko/, so no conflicts.
            git pull --rebase origin main
            git push origin main
          fi
