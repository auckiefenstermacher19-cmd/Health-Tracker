name: Health Tracker Consolidation

# ── Trigger Strategy ──────────────────────────────────────────────────────────
#
# This workflow runs whenever either upstream source file is updated AND when
# scheduled as a daily safety-net.  The schedule runs after both upstream
# workflows have had time to complete:
#   - WHOOP daily_sync runs at 12:00 UTC (7:00 AM EST)
#   - MyFitnessClone generate_dashboard runs on push
#   - Health Tracker runs at 13:30 UTC — 90 minutes after WHOOP sync
#
# Because GitHub Actions does not support cross-repo push triggers natively,
# we use repository_dispatch (triggered by the upstream repos calling the
# GitHub API) plus a scheduled fallback as a reliability safety net.
#
# See docs/cross_repo_trigger_setup.md for instructions on configuring the
# upstream repositories to fire repository_dispatch events.

on:
  # ── 1. Cross-repo dispatch (preferred) ─────────────────────────────────────
  # Upstream repos fire these events after successfully updating their CSVs.
  # Configure each upstream repo's workflow to call:
  #   POST /repos/{owner}/health-tracker/dispatches
  # with event_type: "whoop_updated" or "meal_updated"
  repository_dispatch:
    types:
      - whoop_updated
      - meal_updated

  # ── 2. Scheduled safety net (fallback) ─────────────────────────────────────
  # Runs daily at 13:30 UTC even if dispatch events were never received.
  # This guarantees the output is never more than 24h stale.
  schedule:
    - cron: "30 13 * * *"

  # ── 3. Manual trigger ───────────────────────────────────────────────────────
  workflow_dispatch:
    inputs:
      force_run:
        description: "Force consolidation even if no source changes detected"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  consolidate:
    name: Fetch → Validate → Consolidate → Commit
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Required to commit Health_Tracker_Master.csv

    steps:
      # ── Step 1: Checkout ───────────────────────────────────────────────────
      - name: Checkout Health Tracker repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── Step 2: Python Setup ───────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── Step 3: Install Dependencies ──────────────────────────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── Step 4: Fetch Source Files ─────────────────────────────────────────
      - name: Fetch source CSVs from upstream repositories
        env:
          GH_PAT:      ${{ secrets.GH_PAT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          WHOOP_REPO:  ${{ vars.WHOOP_REPO }}
          MEAL_REPO:   ${{ vars.MEAL_REPO }}
        run: python fetch_sources.py

      # ── Step 5: Validate Sources ───────────────────────────────────────────
      - name: Validate source files and detect schema changes
        run: python validate_sources.py

      # ── Step 6: Consolidate ────────────────────────────────────────────────
      - name: Run consolidation engine
        run: python consolidate.py

      # ── Step 7: Generate Audit Report ─────────────────────────────────────
      - name: Generate audit report
        run: python generate_audit_report.py

      # ── Step 8: Commit Output ──────────────────────────────────────────────
      - name: Commit consolidated output and logs
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage the master output and supporting artifacts
          git add Health_Tracker_Master.csv
          git add schema/
          git add logs/

          # Only commit if there are actual changes
          if git diff --staged --quiet; then
            echo "No changes to commit — Health_Tracker_Master.csv is already up to date."
          else
            TRIGGER="${{ github.event_name }}"
            DATE=$(date -u '+%Y-%m-%d')

            if [ "$TRIGGER" = "repository_dispatch" ]; then
              EVENT="${{ github.event.action }}"
              git commit -m "chore: consolidate health data ${DATE} [${EVENT}]"
            elif [ "$TRIGGER" = "schedule" ]; then
              git commit -m "chore: consolidate health data ${DATE} [scheduled]"
            else
              git commit -m "chore: consolidate health data ${DATE} [manual]"
            fi

            git push
            echo "Health_Tracker_Master.csv committed and pushed."
          fi

      # ── Step 9: Summary ───────────────────────────────────────────────────
      - name: Print run summary
        if: always()
        run: |
          echo "============================================"
          echo "  Health Tracker Consolidation — Summary"
          echo "============================================"
          echo ""
          if [ -f Health_Tracker_Master.csv ]; then
            ROWS=$(tail -n +2 Health_Tracker_Master.csv | wc -l)
            COLS=$(head -1 Health_Tracker_Master.csv | tr ',' '\n' | wc -l)
            echo "  Output file : Health_Tracker_Master.csv"
            echo "  Rows        : $ROWS"
            echo "  Columns     : $COLS"
          else
            echo "  Output file not found — consolidation may have failed."
          fi
          echo ""
          if [ -f logs/audit_report.md ]; then
            echo "  Audit report: logs/audit_report.md"
          fi
          echo "============================================"
