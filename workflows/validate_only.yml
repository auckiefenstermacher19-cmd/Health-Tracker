name: Validate Sources Only

# ── Purpose ───────────────────────────────────────────────────────────────────
# Run validation checks independently of consolidation.
# Useful for:
#   - Debugging schema change warnings
#   - Confirming source files are accessible and readable
#   - Running as a pre-check before a major consolidation run
#   - Scheduled weekly schema integrity check

on:
  workflow_dispatch:

  # Weekly schema integrity check — every Monday at 09:00 UTC
  schedule:
    - cron: "0 9 * * 1"

jobs:
  validate:
    name: Fetch and Validate Source Files
    runs-on: ubuntu-latest

    permissions:
      contents: write   # To update schema snapshots if schema has changed

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch source files
        env:
          GH_PAT:      ${{ secrets.GH_PAT }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          WHOOP_REPO:  ${{ vars.WHOOP_REPO }}
          MEAL_REPO:   ${{ vars.MEAL_REPO }}
        run: python fetch_sources.py

      - name: Validate source files
        run: python validate_sources.py

      - name: Commit updated schema snapshots (if changed)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schema/ logs/
          git diff --staged --quiet \
            && echo "Schema unchanged — nothing to commit." \
            || git commit -m "chore: update schema snapshots [validate-only]" && git push

      - name: Print validation summary
        if: always()
        run: |
          echo "=============================="
          echo "  Validation Run Complete"
          echo "=============================="
          if [ -d data/schema ]; then
            echo "Schema snapshots:"
            ls -la data/schema/
          fi
          if [ -d logs ]; then
            echo "Validation logs:"
            ls -lt logs/*.log 2>/dev/null | head -5
          fi
